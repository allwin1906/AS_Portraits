<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model & Editorial Portfolios | AS Portraits</title>
  <meta name="description" content="High-end editorial and cinematic portfolios for models and brands. Photography by AS Portraits." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --gold: #c9a96e; --gold-2: #e0c48a;
      --black: #080808; --dark: #0f0f0f; --charcoal: #141414;
      --beige: #f5f0e8;
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'Inter', system-ui, sans-serif;
    }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { background: var(--black); color: var(--beige); font-family: var(--sans); overflow-x: hidden; opacity: 1; transition: opacity 0.4s ease-in-out; }
    body.page-exit { opacity: 0 !important; }
    a { text-decoration: none; color: inherit; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* NAV */
    .album-nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 500;
      padding: 1.2rem clamp(1.5rem, 5vw, 4rem);
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.5s, border-color 0.5s;
    }
    .album-nav.scrolled { background: rgba(8,8,8,0.9); backdrop-filter: blur(20px); }
    .back-link { display: flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(245,240,232,0.6); transition: color 0.3s; }
    .nav-brand { font-family: var(--sans); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.25em; color: var(--gold); }

    /* HERO */
    .hero {
      position: relative; height: 100svh; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .hero-img {
      position: absolute; inset: 0;
      background-image: url('https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647525/008A2958_lxuksg.jpg');
      background-size: cover; background-position: center;
      filter: brightness(0.5);
      transform: scale(1.1); transition: transform 10s ease;
    }
    .hero-img.loaded { transform: scale(1); }
    .hero-content { position: relative; z-index: 2; text-align: center; max-width: 900px; padding: 0 2rem; }
    .hero-tag { font-size: 0.75rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 2rem; }
    .hero-title { font-family: var(--serif); font-size: clamp(4rem, 15vw, 11rem); font-style: italic; line-height: 0.8; color: #fff; margin-bottom: 2rem; }
    
    /* PORTOFOLIO GRID */
    .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: rgba(255,255,255,0.05); }
    .item { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--charcoal); cursor: pointer; opacity: 0; transition: opacity 1s ease; }
    .item.visible { opacity: 1; }
    .item img { transition: transform 1.2s cubic-bezier(0.16,1,0.3,1); filter: brightness(0.85); }
    .item:hover img { transform: scale(1.08); filter: brightness(1); }
    .item-info { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(8,8,8,0.4); opacity: 0; transition: opacity 0.5s; }
    .item:hover .item-info { opacity: 1; }
    .item-title { font-family: var(--serif); font-size: 1.5rem; color: #fff; font-style: italic; transform: translateY(10px); transition: transform 0.5s; }
    .item:hover .item-title { transform: translateY(0); }

    /* CTA */
    .cta-editorial { padding: 10vw 2rem; text-align: center; }
    .cta-editorial h2 { font-family: var(--serif); font-size: clamp(3rem, 10vw, 7rem); font-style: italic; color: #fff; line-height: 1; margin-bottom: 3rem; }
    .btn-editorial { display: inline-flex; align-items: center; gap: 1rem; color: #fff; font-size: 1.2rem; border-bottom: 1px solid var(--gold); padding: 0.5rem 0; transition: 0.3s; }
    .btn-editorial:hover { color: var(--gold); padding-right: 1.5rem; }

    footer { text-align: center; padding: 5rem 2rem; font-size: 0.75rem; color: rgba(245,240,232,0.2); }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 900; background: #000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lb-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lb-close { position: fixed; top: 2rem; right: 2rem; color: #fff; font-size: 2rem; cursor: pointer; z-index: 901; }

    @media (max-width: 640px) {
      .portfolio-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="album-nav" id="album-nav">
    <button onclick="history.length > 1 ? history.back() : window.location.href='/AS_Portraits/'" class="back-link" style="background:none;border:none;cursor:pointer;font-family:inherit;">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </button>
    <span class="nav-brand">EDITORIAL</span>
  </nav>

  <section class="hero">
    <div class="hero-img" id="hero-img"></div>
    <div class="hero-content">
      <div class="hero-tag">Model & Editorial</div>
      <h1 class="hero-title">High<br><em>End</em></h1>
    </div>
  </section>

  <div class="portfolio-grid">
    <div class="item" data-index="0">
      <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647525/008A2958_lxuksg.jpg" alt="Editorial shoot" loading="lazy" />
      <div class="item-info"><span class="item-title">Visual Arts</span></div>
    </div>
    <div class="item" data-index="1">
      <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644562/ASP09682_viqqdq.jpg" alt="Style" loading="lazy" />
      <div class="item-info"><span class="item-title">Styling</span></div>
    </div>
    <div class="item" data-index="2">
      <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647405/ASP01669_qkkznm.jpg" alt="Fashion" loading="lazy" />
      <div class="item-info"><span class="item-title">Fashion</span></div>
    </div>
    <div class="item" data-index="3">
      <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644542/ASP02540_zx9nqw.jpg" alt="Candid editorial" loading="lazy" />
      <div class="item-info"><span class="item-title">Candid Couture</span></div>
    </div>
  </div>

  <section class="cta-editorial">
    <h2>Ready to build your <em>portfolio?</em></h2>
    <a href="https://wa.me/918754137640" target="_blank" rel="noopener" class="btn-editorial">Book a Session →</a>
  </section>

  <footer>© 2026 AS Portraits. All rights reserved by <strong><a href="https://share.google/Shxgu4SYuWEArAekm" target="_blank" rel="noopener" style="color: inherit; text-decoration: none;">Javia Ventures</a></strong>.</footer>

  <div class="lightbox" id="lightbox">
    <div class="lb-close" id="lb-close">✕</div>
    <img src="" alt="" class="lb-img" id="lb-img" />
  </div>

  <script>
    const nav = document.getElementById('album-nav')
    window.addEventListener('scroll', () => {
      if (scrollY > window.innerHeight * 0.5) nav.classList.add('scrolled')
      else nav.classList.remove('scrolled')
    })
    setTimeout(() => document.getElementById('hero-img').classList.add('loaded'), 100)

    const items = document.querySelectorAll('.item')
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target) } })
    }, { threshold: 0.1 })
    items.forEach(i => io.observe(i))

    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img')
    items.forEach(item => {
      item.onclick = () => {
        lbImg.src = item.querySelector('img').src
        lb.classList.add('open')
        document.body.style.overflow = 'hidden'
      }
    })
    document.getElementById('lb-close').onclick = () => {
      lb.classList.remove('open')
      document.body.style.overflow = ''
    }

    // Page Transitions
    document.addEventListener('click', e => {
      const link = e.target.closest('a');
      if (!link) return;
      const href = link.getAttribute('href');
      const target = link.getAttribute('target');
      if (href && !href.startsWith('http') && !href.startsWith('mailto') && !href.startsWith('tel') && !href.startsWith('#') && target !== '_blank') {
        e.preventDefault();
        document.body.classList.add('page-exit');
        setTimeout(() => { window.location.href = href; }, 400);
      }
    });
  </script>
</body>
</html>
