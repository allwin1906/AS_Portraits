<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maternity Photography | AS Portraits</title>
  <meta name="description" content="Beautifully capturing the radiant journey to motherhood. Maternity photography by AS Portraits." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c9a96e; --gold-2: #e0c48a;
      --black: #080808; --dark: #0f0f0f; --charcoal: #141414;
      --beige: #f5f0e8;
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'Inter', system-ui, sans-serif;
    }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { background: var(--black); color: var(--beige); font-family: var(--sans); overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* NAV */
    .album-nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 500;
      padding: 1.2rem clamp(1.5rem, 5vw, 4rem);
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.5s, border-color 0.5s;
      border-bottom: 1px solid transparent;
    }
    .album-nav.scrolled { background: rgba(8,8,8,0.9); backdrop-filter: blur(20px); border-bottom-color: rgba(255,255,255,0.05); }
    .back-link { display: flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(245,240,232,0.6); transition: color 0.3s; }
    .back-link svg { transition: transform 0.3s ease; }
    .back-link:hover { color: var(--gold); }
    .back-link:hover svg { transform: translateX(-4px); }
    .nav-brand { font-family: var(--sans); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.25em; color: var(--gold); }

    /* HERO */
    .hero {
      position: relative; height: 85svh; min-height: 550px;
      overflow: hidden; display: flex; align-items: flex-end;
    }
    .hero-img {
      position: absolute; inset: 0;
      background-image: url('https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644562/ASP09682_viqqdq.jpg');
      background-size: cover; background-position: center 30%;
      filter: brightness(0.65);
      transform: scale(1.06); transition: transform 8s ease;
    }
    .hero-img.loaded { transform: scale(1); }
    .hero-grad { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,0.2) 60%, rgba(8,8,8,0.3) 100%); }
    .hero-content { position: relative; z-index: 2; padding: 0 clamp(1.5rem,6vw,6rem) clamp(4rem,8vh,7rem); width: 100%; }
    .hero-tag { display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
    .hero-tag::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
    .hero-title { font-family: var(--serif); font-size: clamp(3.5rem,10vw,8rem); font-style: italic; line-height: 0.9; color: #fff; margin-bottom: 1.5rem; }
    .hero-sub { font-size: 1.1rem; color: rgba(245,240,232,0.5); font-family: var(--serif); font-style: italic; max-width: 50ch; line-height: 1.6; }

    /* GALLERY */
    .gallery-section { padding: clamp(4rem, 8vw, 8rem) clamp(1.5rem, 5vw, 4rem); max-width: 1400px; margin: 0 auto; }
    .section-label { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 3rem; display: flex; align-items: center; gap: 0.8rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,169,110,0.15); }

    .mosaic-layout { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1.2rem; }
    .photo-wrap { 
      position: relative; overflow: hidden; border-radius: 4px; background: var(--charcoal); cursor: zoom-in;
      opacity: 0; transform: translateY(20px); transition: all 0.8s ease;
    }
    .photo-wrap.visible { opacity: 1; transform: translateY(0); }
    .photo-wrap img { transition: transform 0.8s ease; filter: brightness(0.9); }
    .photo-wrap:hover img { transform: scale(1.05); filter: brightness(1); }

    .span-3 { grid-column: span 3; aspect-ratio: 4/5; }
    .span-2 { grid-column: span 2; aspect-ratio: 1; }
    .span-6 { grid-column: span 6; aspect-ratio: 16/7; }

    /* CTA */
    .cta-area { 
      padding: clamp(5rem, 10vw, 10rem) clamp(1.5rem, 5vw, 4rem);
      text-align: center; background: linear-gradient(to bottom, transparent, #0c0b09);
    }
    .cta-title { font-family: var(--serif); font-size: clamp(2.5rem, 6vw, 4.5rem); font-style: italic; color: #fff; margin-bottom: 2rem; }
    .btn-gold { display: inline-flex; align-items: center; gap: 0.6rem; background: var(--gold); color: var(--black); padding: 1.1rem 2.8rem; border-radius: 2px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.3s; }
    .btn-gold:hover { background: var(--gold-2); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,169,110,0.15); }

    footer { text-align: center; padding: 4rem 2rem; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; color: rgba(245,240,232,0.3); }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 900; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lb-close { position: fixed; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
    .lb-close:hover { opacity: 1; }
    .lb-img { max-width: 90vw; max-height: 85vh; border-radius: 2px; }

    @media (max-width: 768px) {
      .mosaic-layout { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .span-3, .span-2, .span-6 { grid-column: span 2; aspect-ratio: 4/5; }
      .span-6 { aspect-ratio: 16/9; }
    }
  </style>
</head>
<body>

  <nav class="album-nav" id="album-nav">
    <a href="/AS_Portraits/" class="back-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      AS Portraits
    </a>
    <span class="nav-brand">AS PORTRAITS</span>
  </nav>

  <section class="hero">
    <div class="hero-img" id="hero-img"></div>
    <div class="hero-grad"></div>
    <div class="hero-content">
      <div class="hero-tag">Maternity</div>
      <h1 class="hero-title">Radiant <em>Motherhood</em></h1>
      <p class="hero-sub">Honouring the profound beauty and strength of your journey into motherhood.</p>
    </div>
  </section>

  <div class="gallery-section">
    <div class="section-label">A Chapter of Joy</div>
    <div class="mosaic-layout">
      <div class="photo-wrap span-3" data-index="0">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644562/ASP09682_viqqdq.jpg" alt="Maternity portrait" loading="lazy" />
      </div>
      <div class="photo-wrap span-3" data-index="1">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647405/ASP01669_qkkznm.jpg" alt="Glowing" loading="lazy" />
      </div>
      <div class="photo-wrap span-6" data-index="2">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644518/ASP02532_twiccf.jpg" alt="Full view" loading="lazy" />
      </div>
      <div class="photo-wrap span-2" data-index="3">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775644541/ASP02519_tgq8zn.jpg" alt="Happiness" loading="lazy" />
      </div>
      <div class="photo-wrap span-2" data-index="4">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647500/AKZ04343_kpqi0e.jpg" alt="Portrait" loading="lazy" />
      </div>
      <div class="photo-wrap span-2" data-index="5">
        <img src="https://res.cloudinary.com/duvkbm8jv/image/upload/q_auto/f_auto/v1775647548/AKZ04700_d6ny6b.jpg" alt="Details" loading="lazy" />
      </div>
    </div>
  </div>

  <section class="cta-area">
    <h2 class="cta-title">Cherish the <em>Wait</em></h2>
    <a href="https://wa.me/918754137640" target="_blank" rel="noopener" class="btn-gold">Enquire for Maternity Session</a>
  </section>

  <footer>© 2026 AS Portraits. All rights reserved by <strong><a href="https://share.google/Shxgu4SYuWEArAekm" target="_blank" rel="noopener" style="color: inherit; text-decoration: none;">Javia Ventures</a></strong>.</footer>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <img src="" alt="" class="lb-img" id="lb-img" />
  </div>

  <script>
    const nav = document.getElementById('album-nav')
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 80), { passive: true })
    setTimeout(() => document.getElementById('hero-img').classList.add('loaded'), 100)

    const photos = document.querySelectorAll('.photo-wrap')
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target) } })
    }, { threshold: 0.1 })
    photos.forEach(p => io.observe(p))

    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img')
    photos.forEach(w => {
      w.onclick = () => {
        lbImg.src = w.querySelector('img').src
        lb.classList.add('open')
        document.body.style.overflow = 'hidden'
      }
    })
    document.getElementById('lb-close').onclick = () => {
      lb.classList.remove('open')
      document.body.style.overflow = ''
    }
    lb.onclick = (e) => { if(e.target === lb) document.getElementById('lb-close').click() }
  </script>
</body>
</html>
